name: CICD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Select environment for deployment
        default: dev
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code clone from github"

  build:
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: Build Docker container
        run: echo "Docker container build"

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: test the containers
        run: echo "Testing the containers"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: deploy the app
        run: echo "Deploying to ${{ github.event.inputs.environment }}"
