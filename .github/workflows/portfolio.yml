name: Portfolio

on: 
  push:
    branches: [main]


permissions:
  pages: write
  id-token: write
  content: read


jobs:
  
  deploy:
    
    runs-on: ubuntu:latest

enviroment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

  steps:
  
    - name: Checkout code
      uses: action/checkout@v4

    - name: Setup github pages
      uses: action/config-pages@v4

    - name: upload static files
      uses: action/upload-pages-artifact@v4

    - name: deploy to github pages
      uses: action/deploy-pages@v4