name: Full CI/CD Pipeline

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: Select environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🔍 DEBUG (temporary - remove later)
      - name: Debug Username
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USER }}
        run: echo "User = $DOCKER_USER"

      - name: Set Environment
        run: echo "ENV=${{ github.event.inputs.environment || 'dev' }}" >> $GITHUB_ENV

      # 🔥 FIXED LOGIN (ENV method)
      - name: Login to DockerHub
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USER }}
          DOCKER_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
        run: echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin

      - name: Build Docker Image (Dev)
        if: env.ENV == 'dev'
        run: docker build -f Dockerfile.dev -t $DOCKER_USER/devops-app:dev .

      - name: Build Docker Image (Production)
        if: env.ENV == 'production' || github.ref == 'refs/heads/main'
        run: docker build -t $DOCKER_USER/devops-app:latest .

      - name: Push Docker Image
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USER }}
        run: |
          if [ "$ENV" = "dev" ]; then
            docker push $DOCKER_USER/devops-app:dev
          else
            docker push $DOCKER_USER/devops-app:latest
          fi

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Run Tests
        run: echo "Running tests..."

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Dev
        if: env.ENV == 'dev'
        run: echo "Deploying to Dev Server"

      - name: Deploy to Production
        if: env.ENV == 'production'
        run: echo "Deploying to Production Server"