<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      background: #0f172a;
      color: #fff;
      overflow-x: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
      position: fixed;
      width: 100%;
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    header h1 { color: #38bdf8; }

    nav a {
      color: #fff;
      margin-left: 20px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover { color: #38bdf8; }

    section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px;
    }

    .hero {
      flex-direction: column;
      text-align: center;
    }

    .hero h2 {
      font-size: 3rem;
      animation: fadeIn 2s ease;
    }

    .hero p {
      margin-top: 10px;
      color: #94a3b8;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #38bdf8;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      color: #000;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #38bdf8;
    }

    .skills {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 1000px;
    }

    .card {
      padding: 20px;
      background: #1e293b;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 20px #38bdf8;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <h1>DevOps Engineer</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="home" class="hero">
  <h2>Hi, I'm Siddharth 🚀</h2>
  <p>DevOps Engineer | CI/CD | Docker | AWS</p>
  <button class="btn">Hire Me</button>
</section>

<section id="skills ">
  <div class="skills">
    <div class="card">Docker</div>
    <div class="card">Kubernetes</div>
    <div class="card">CI/CD</div>
    <div class="card">GitHub Actions</div>
    <div class="card">AWS</div>
    <div class="card">Linux</div>
  </div>
</section>

<section id="projects">
  <div class="skills">
    <div class="card">CI/CD Pipeline Project</div>
    <div class="card">Dockerized Web App</div>
    <div class="card">Kubernetes Deployment</div>
  </div>
</section>

<section id="contact" class="hero">
  <h2>Contact Me</h2>
  <p>Email: siddharth@email.com</p>
</section>

<footer>
  <p>© 2026 Siddharth | DevOps Portfolio</p>
</footer>

<script>
  document.querySelectorAll('nav a').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
      e.preventDefault();
      document.querySelector(this.getAttribute('href')).scrollIntoView({
        behavior: 'smooth'
      });
    });
  });
</script>

</body>
</html>
